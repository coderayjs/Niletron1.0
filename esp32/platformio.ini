; NILETRON ESP32 firmware - Smart Home Automation
; Flash: pio run -t upload
; Monitor: pio device monitor -b 115200
;
; If upload fails, find ESP32 port:  pio device list
; Then set it below (uncomment and fix the path) or run:
;   pio run -t upload --upload-port /dev/cu.YOUR_ESP32_PORT

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 38400
upload_port = /dev/cu.usbserial-0001
board_build.flash_mode = dio
board_build.flash_size = 2MB
lib_deps =
    ArduinoJson@^6.21.3

build_flags =
    -DCORE_DEBUG_LEVEL=1
