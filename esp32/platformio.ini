; NILETRON ESP32 firmware - Smart Home Automation
; Flash: pio run -t upload
; Monitor: pio device monitor -b 115200
;
; If upload fails:
;   1) Quit serial monitor (only one app may use the USB serial port).
;   2) Use a data USB cable, try another USB port (no long/no-name hubs).
;   3) Unplug shields/wires from GPIOs used by onboard flash (especially GPIO6–11 on many DevKits).
;   4) BOOT/EN: hold BOOT, tap RESET, release BOOT, then upload (some boards need this).
; Find port:  pio device list  →  set upload_port below or:
;   pio run -t upload --upload-port /dev/cu.YOUR_PORT

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Slower uploads are more reliable on CH340/CP2102 USB–serial links than 921600.
upload_speed = 115200
upload_port = /dev/cu.usbserial-0001
upload_flags =
    --before=default_reset
    --after=hard_reset
board_build.flash_mode = dio
; Match your module (most ESP32 DevKit boards are 4MB; 2MB mismatch can confuse the flasher).
board_build.flash_size = 4MB
lib_deps =
    ArduinoJson@^6.21.3

build_flags =
    -DCORE_DEBUG_LEVEL=1
